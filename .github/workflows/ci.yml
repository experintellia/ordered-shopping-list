name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: write # create releases / upload .xdc on tags
  pull-requests: write # sticky preview-build comment on PRs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      # npm ci with the committed package-lock.json — pnpm ignored it and
      # resolved fresh (breaking) dependency versions on every run
      - run: npm ci
      - run: npm run check
      - run: npm run build

      - name: Upload preview .xdc artifact
        if: github.event_name == 'pull_request'
        id: upload_xdc
        uses: actions/upload-artifact@v4
        with:
          name: preview-xdc
          path: dist-xdc/app.xdc
          retention-days: 30

      - name: Post sticky PR comment with preview link
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: xdc-preview
          message: |
            ## 📦 Preview build ready

            [Download app.xdc](${{ steps.upload_xdc.outputs.artifact-url }}) and drop it into a Delta Chat chat to test this PR.

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            Auto-generated release
          prerelease: ${{ contains(github.event.ref, '-beta') }}
          fail_on_unmatched_files: true
          files: ./dist-xdc/*.xdc
