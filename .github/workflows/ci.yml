name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: write # create releases / upload .xdc on tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      # npm ci with the committed package-lock.json — pnpm ignored it and
      # resolved fresh (breaking) dependency versions on every run
      - run: npm ci
      - run: npm run check
      - run: npm run build

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            Auto-generated release
          prerelease: ${{ contains(github.event.ref, '-beta') }}
          fail_on_unmatched_files: true
          files: ./dist-xdc/*.xdc
